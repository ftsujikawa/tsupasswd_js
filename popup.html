<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tsupasswd bridge</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 12px; width: 360px; position: relative; }
    button { margin-right: 8px; margin-top: 6px; }
    textarea { width: 100%; height: 96px; margin-top: 8px; font-family: Consolas, monospace; }
    pre { white-space: pre-wrap; background: #f5f5f5; padding: 8px; min-height: 60px; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 6px; border-bottom: 1px solid #e0e0e0; font-size: 12px; }
    th { background: #fafafa; position: sticky; top: 0; }
    .table-wrap { max-height: 180px; overflow: auto; border: 1px solid #e0e0e0; border-radius: 6px; }
    .section-title { margin-top: 10px; margin-bottom: 6px; font-size: 13px; }
    .hidden { display: none; }
    .passkey-menu {
      position: absolute;
      z-index: 1000;
      width: 336px;
      background: #fff;
      border: 1px solid #d7d7d7;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
      padding: 8px;
      box-sizing: border-box;
    }
    .menu-title {
      font-size: 12px;
      color: #555;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <h3>tsupasswd bridge</h3>
  <div>
    <button id="connect">Connect</button>
    <button id="send">Send Ping</button>
    <button id="list">List Passkeys</button>
    <button id="clear">Clear</button>
  </div>

  <div class="section-title">RP ID Filter (for list_passkeys)</div>
  <input id="rpIdFilter" type="text" placeholder="example.com" />

  <div class="section-title">Search</div>
  <input id="search" type="text" placeholder="Filter by title / rpId / user / id" />

  <div class="passkey-menu hidden" id="passkeyMenu">
    <div class="menu-title">Passkeys</div>
    <div class="table-wrap">
      <table>
      <thead>
        <tr>
          <th>title</th>
          <th>rpId</th>
          <th>user</th>
          <th>id</th>
          <th>backedUp</th>
          <th>removable</th>
        </tr>
      </thead>
        <tbody id="passkeyRows"></tbody>
      </table>
    </div>
  </div>

  <div class="section-title">Add / Remove</div>
  <div class="row">
    <input id="pkTitle" type="text" placeholder="title" />
    <input id="pkRpId" type="text" placeholder="rpId" />
  </div>
  <div class="row">
    <input id="pkUser" type="text" placeholder="user" />
    <input id="pkId" type="text" placeholder="id (optional)" />
  </div>
  <div>
    <button id="add">Add</button>
    <button id="remove">Remove by id</button>
  </div>

  <label for="payload">Payload JSON</label>
  <textarea id="payload">{"type":"ping","requestId":"demo-1"}</textarea>

  <h4>Result</h4>
  <pre id="result">(no message yet)</pre>

  <script src="popup.js"></script>
</body>
</html>
